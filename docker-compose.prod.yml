version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    image: aegis-api:production
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - POSTGRES_URL=postgresql://postgres:postgres@db:5432/aegis
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      - db
      - redis
      - qdrant
    restart: always

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    command: celery -A backend.worker.celery_app worker --loglevel=info
    environment:
      - POSTGRES_URL=postgresql://postgres:postgres@db:5432/aegis
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aegis
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data_prod:/qdrant/storage
    restart: always

volumes:
  pgdata_prod:
  qdrant_data_prod:
